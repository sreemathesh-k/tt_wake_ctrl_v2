yaml_version: 6

project:
  title:       "Priority-Aware Event-Driven Wake Controller"
  author:      "Sreemathesh K"
  discord:     ""
  description: "4-channel digital wake controller for batteryless IoT. Uses 2FF sync, debounce, AND/OR event logic, priority encoder, and clean pulse generator on SKY130 130nm."
  language:    "Verilog"
  clock_hz:    50000000
  tiles:       "1x1"
  source_files:
    - project.v
    - wake_ctrl_v2.v
  top_module:  "tt_um_sreemathesh_wake_ctrl"

pinout:
  ui[0]: "thresh_in[0]"
  ui[1]: "thresh_in[1]"
  ui[2]: "thresh_in[2]"
  ui[3]: "thresh_in[3]"
  ui[4]: "ch_en[0]"
  ui[5]: "ch_en[1]"
  ui[6]: "ch_en[2]"
  ui[7]: "ch_en[3]"
  uo[0]: "wake_out"
  uo[1]: "evt_flags[0]"
  uo[2]: "evt_flags[1]"
  uo[3]: "evt_flags[2]"
  uo[4]: "evt_flags[3]"
  uo[5]: "priority_ch[0]"
  uo[6]: "priority_ch[1]"
  uo[7]: ""
  uio[0]: "mode_and"
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""
